# cSpell:ignore darkmode
menu:
  Home: / || fas fa-home
  Projects: /projects/ || fas fa-code
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder-open
  About: /about/ || fas fa-user

# 全局背景相关
# 修正：将 .jpg.jpg 统一改为 .jpg（前提是你的 source/img 文件夹下的文件确实叫 bg.jpg）
index_img: /img/bg.jpg
background: url(/img/bg.jpg)
background_dark: url(/img/bg.jpg)
background_style: "background-attachment: fixed; background-size: cover; background-repeat: no-repeat;"

subtitle:
  enable: true  
  sub:  
    - "In the realm of ones and zeros."
    - "Code is Law. Logic is Art."

# 功能开关
local_search:
  enable: true  
darkmode:
  enable: true  
  button: true  

# 头像配置
# 修正：同样去掉多余的 .jpg 后缀
avatar:
  img: /img/avatar.jpg
  rounded: true
  opacity: 1
  zoom: true

# 1. 社交链接
social:
  github: https://github.com/djdj-student || fab fa-github

# 2. Follow Me
follow_me:
  enable: true
  # 保持一致，这里没问题
  github: true 

# CSS 注入
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom: []
